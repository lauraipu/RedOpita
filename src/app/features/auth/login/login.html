<div class="login-container d-flex align-items-center justify-content-center">
  <div class="card p-4 shadow-lg" style="width: 100%; max-width: 400px; border-radius: 20px; border: none;">
    <ng-container *ngIf="registrado">
      <div class="alert alert-success text-center rounded-pill border-0 mb-4" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>
        ¡Registrado con éxito!
      </div>
    </ng-container>

    <div class="text-center mb-4">
      <h2 class="fw-bold">{{ isLogin ? 'Bienvenido' : 'Crea tu cuenta' }}</h2>
      <p class="text-muted">{{ isLogin ? 'Ingresa a RedOpita' : 'Únete a nuestra comunidad' }}</p>
    </div>

    <form (ngSubmit)="onSubmit()">
      <ng-container *ngIf="!isLogin">
        <div class="mb-3">
          <label class="form-label small fw-bold">Nombre completo</label>
          <input type="text" name="nombre" [(ngModel)]="usuario.nombre" class="form-control rounded-pill" placeholder="Tu nombre" required>
        </div>
      </ng-container>

      <div class="mb-3">
        <label class="form-label small fw-bold">Correo electrónico</label>
        <input type="email" name="email" [(ngModel)]="email" class="form-control rounded-pill" placeholder="ejemplo@correo.com" required>
      </div>

      <div class="mb-3">
        <label class="form-label small fw-bold">Contraseña</label>
        <input type="password" name="password" [(ngModel)]="password" class="form-control rounded-pill" placeholder="********" required>
      </div>

      <div class="mb-3">
        <label class="form-label small fw-bold">Tipo de cuenta</label>
        <select class="form-select rounded-pill" [(ngModel)]="role" name="role">
          <option value="Voluntario">Voluntario</option>
          <option value="Organización">Organización</option>
        </select>
      </div>

      <button type="submit" class="btn btn-primary w-100 rounded-pill">
        {{ isLogin ? 'Ingresar' : 'Crear cuenta' }}
      </button>
    </form>

    <div class="text-center mt-3">
      <span>{{ isLogin ? '¿No tienes cuenta?' : '¿Ya tienes cuenta?' }}</span>
      <a href="javascript:void(0)" (click)="toggleMode()" class="fw-bold" style="color: #f28131; text-decoration: none;">
        {{ isLogin ? 'Regístrate aquí' : 'Inicia sesión' }}
      </a>
    </div>
  </div>
</div>
